server {
    listen 80;
    server_name doom2.auto-ctl.io;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name doom2.auto-ctl.io;

    ssl_certificate     /etc/letsencrypt/live/doom2.auto-ctl.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doom2.auto-ctl.io/privkey.pem;

    root /opt/doom-ctl-v2;
    index index.html;

    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";

    location / {
        try_files $uri $uri/ =404;
    }

    location /ws {
        proxy_pass http://127.0.0.1:3667;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600;
    }

    location ~ /\.(git|env) { deny all; }
    location ~ /config/     { deny all; }
    location ~ /server/     { deny all; }
}
