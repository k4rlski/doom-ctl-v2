<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>doom-ctl v2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; color: #00ff88; font-family: 'Courier New', monospace; overflow: hidden; }
    #canvas { display: block; width: 100vw; height: 100vh; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0a0f; z-index: 10;
    }
    #loading h1 { font-size: 2.5rem; color: #00ff88; text-shadow: 0 0 20px #00ff88; margin-bottom: 1rem; }
    #loading p  { color: #00cc66; font-size: 0.9rem; opacity: 0.7; }
    #loading-bar {
      width: 300px; height: 4px;
      background: #111; border: 1px solid #00ff8833;
      margin: 1.5rem 0 1rem;
    }
    #loading-fill { height: 100%; background: #00ff88; width: 0%; transition: width 0.3s; }
    #loading-status { font-size: 0.8rem; color: #00aa55; min-height: 1.2em; }
    .scanline {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
      );
      pointer-events: none; z-index: 5;
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>doom-ctl v2</h1>
    <p>WebGL · 3D · Multiplayer</p>
    <div id="loading-bar"><div id="loading-fill"></div></div>
    <div id="loading-status">Initializing engine...</div>
  </div>
  <canvas id="render-canvas"></canvas>
  <div class="scanline"></div>

  <!-- Babylon.js CDN -->
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
  <script src="src/game.js"></script>
</body>
</html>
